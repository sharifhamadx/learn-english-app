name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Create Web Asset Directory
        run: npm run build || mkdir -p out

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: cd android && chmod +x gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace > ../gradle-log.txt 2>&1

      - name: Catch and Show Error
        if: failure()
        run: |
          echo "🚨🚨🚨 ROOT CAUSE DETECTED: 🚨🚨🚨"
          grep -iE "caused by:|error:|exception|failed" gradle-log.txt | tail -n 30

      - name: Upload Error Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ERROR-LOG-READ-ME
          path: gradle-log.txt

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MokoLearnEnglish-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
