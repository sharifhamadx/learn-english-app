name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Create Web Asset Directory
        run: mkdir -p public

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./android/gradlew

      - name: Build APK
        run: cd android && ./gradlew assembleDebug --stacktrace
        continue-on-error: true

      - name: Capture Gradle Logs
        if: failure()
        run: |
          echo "Building failed. Logging Gradle logs:"
          cat android/gradle.properties || echo "No gradle.properties"
          find . -name "*.log" -exec cat {} + || echo "No log files found"
          echo "Please check the full log output above in this Actions run."

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MokoLearnEnglish-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
